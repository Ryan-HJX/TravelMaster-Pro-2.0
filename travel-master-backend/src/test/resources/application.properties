# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:travelmaster;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Disable Flyway for tests
spring.flyway.enabled=false

# Use embedded Redis (will be auto-configured if dependency exists)
# For CI/CD, we'll mock Redis beans instead
spring.data.redis.host=localhost
spring.data.redis.port=6379

# JWT Configuration
travelmaster.jwt.issuer=test
travelmaster.jwt.secret=test-secret-key-for-testing-purposes-only-1234567890
travelmaster.jwt.access-ttl=2h
travelmaster.jwt.refresh-ttl=7d

# Internal Token
travelmaster.internal.token=test-token

# Redis Stream Names
travelmaster.redis.ai-task-stream=test:ai:tasks
travelmaster.redis.notification-stream=test:notifications

# AI Service Configuration
travelmaster.ai.base-url=http://localhost:8000
travelmaster.ai.compatibility-endpoint=/api/v1/plan
