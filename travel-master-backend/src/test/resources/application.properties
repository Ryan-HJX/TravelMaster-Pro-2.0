spring.datasource.url=jdbc:h2:mem:travelmaster;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false
spring.data.redis.host=localhost
spring.data.redis.port=6379
travelmaster.jwt.issuer=test
travelmaster.jwt.secret=test-secret-test-secret-test-secret-test-secret
travelmaster.internal.token=test-token
travelmaster.redis.ai-task-stream=test:ai:tasks
travelmaster.redis.notification-stream=test:notifications
travelmaster.ai.base-url=http://localhost:8000
travelmaster.ai.compatibility-endpoint=/api/v1/plan
