server.port=8080
spring.application.name=travelmaster-pro-backend

spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/travelmaster?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false}
spring.datasource.username=${MYSQL_USERNAME:travelmaster}
spring.datasource.password=${MYSQL_PASSWORD:travelmaster}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
# Cross-database compatibility: use VARCHAR for enums instead of native ENUM
spring.jpa.properties.hibernate.type.preferred_enum_type=STRING

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=5s
# Fix for Redis Cache ClassCastException
spring.cache.type=redis
spring.data.redis.repositories.enabled=false

spring.jackson.default-property-inclusion=non_null

travelmaster.jwt.issuer=travelmaster-pro
travelmaster.jwt.secret=${JWT_SECRET:travelmaster-pro-demo-secret-travelmaster-pro-demo-secret}
travelmaster.jwt.access-ttl=PT2H
travelmaster.jwt.refresh-ttl=P7D
travelmaster.internal.token=${INTERNAL_API_TOKEN:travelmaster-internal-token}
travelmaster.redis.ai-task-stream=travelmaster:ai:tasks
travelmaster.redis.notification-stream=travelmaster:notification:events
travelmaster.ai.base-url=${PYTHON_AGENT_URL:http://localhost:8000}
travelmaster.ai.compatibility-endpoint=/api/v1/plan

logging.level.org.springframework.security=INFO
logging.level.com.travelmaster=INFO
