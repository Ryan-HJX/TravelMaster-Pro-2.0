apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: travelmaster-backend-hpa
  namespace: travelmaster
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: travelmaster-backend
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: travelmaster-frontend-hpa
  namespace: travelmaster
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: travelmaster-frontend
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75