name: TravelMaster CI/CD Pipeline

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]
  workflow_dispatch:

env:
  JAVA_VERSION: 21
  MAVEN_CACHE: maven-repo
  NODE_VERSION: 20

jobs:
  build:
    name: Build & Unit Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ env.MAVEN_CACHE }}-${{ hashFiles('travel-master-backend/pom.xml') }}
          restore-keys: |
            ${{ env.MAVEN_CACHE }}-

      - name: Build backend with Maven
        run: cd travel-master-backend && mvn clean compile -q

      - name: Run unit tests
        run: cd travel-master-backend && mvn test -Dtest="!*ContractTest"

      - name: Build frontend
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: travel-master-frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd travel-master-frontend && npm install --prefer-offline

      - name: Build frontend
        run: cd travel-master-frontend && npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: travelmaster-build
          path: |
            travel-master-backend/target/*.jar
            travel-master-frontend/dist/

  contract-test:
    name: API Contract Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ env.MAVEN_CACHE }}-${{ hashFiles('travel-master-backend/pom.xml') }}

      - name: Run contract tests
        run: cd travel-master-backend && mvn test -Dtest="*ContractTest"

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ env.MAVEN_CACHE }}-${{ hashFiles('travel-master-backend/pom.xml') }}

      - name: Run OWASP Dependency Check via Maven
        run: cd travel-master-backend && mvn org.owasp:dependency-check-maven:9.0.7:check -DfailBuildOnCVSS=7 -Dformat=HTML -DoutputDirectory=reports
        continue-on-error: true

      - name: Upload security report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: travel-master-backend/reports/
          if-no-files-found: ignore

  performance-test:
    name: Performance Test
    runs-on: ubuntu-latest
    needs: [build, contract-test]
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Create results directory
        run: mkdir -p load-test/results

      - name: Run health check test
        run: cd load-test && k6 run health-check.js || true
        env:
          BASE_URL: ${{ secrets.TEST_API_URL || 'http://localhost:8080' }}
        continue-on-error: true

      - name: Run login stress test
        run: cd load-test && k6 run --out json=results/login-stress.json login-stress.js || true
        env:
          BASE_URL: ${{ secrets.TEST_API_URL || 'http://localhost:8080' }}
        continue-on-error: true

      - name: Upload performance results
        uses: actions/upload-artifact@v4
        with:
          name: performance-results
          path: results/

  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [build, contract-test, security-scan]
    if: github.ref == 'refs/heads/master'
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: env.DOCKER_USERNAME != '' && env.DOCKER_PASSWORD != ''
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./travel-master-backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/travelmaster-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/travelmaster-backend:${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./travel-master-frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/travelmaster-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/travelmaster-frontend:${{ github.sha }}

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/master'
    env:
      KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Configure Kubernetes credentials
        if: env.KUBE_CONFIG != ''
        uses: azure/k8s-set-context@v4
        with:
          kubeconfig: ${{ env.KUBE_CONFIG }}

      - name: Deploy backend
        if: env.KUBE_CONFIG != '' && env.DOCKER_USERNAME != ''
        run: |
          kubectl set image deployment/travelmaster-backend travelmaster-backend=${{ env.DOCKER_USERNAME }}/travelmaster-backend:${{ github.sha }}
          kubectl rollout status deployment/travelmaster-backend

      - name: Deploy frontend
        if: env.KUBE_CONFIG != '' && env.DOCKER_USERNAME != ''
        run: |
          kubectl set image deployment/travelmaster-frontend travelmaster-frontend=${{ env.DOCKER_USERNAME }}/travelmaster-frontend:${{ github.sha }}
          kubectl rollout status deployment/travelmaster-frontend

      - name: Verify deployment
        if: env.KUBE_CONFIG != ''
        run: |
          kubectl get pods
          kubectl get services

