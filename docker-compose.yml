version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: travelmaster-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: travelmaster
      MYSQL_USER: travelmaster
      MYSQL_PASSWORD: travelmaster
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-time-zone='+00:00'
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - travelmaster-net

  redis:
    image: redis:7-alpine
    container_name: travelmaster-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - travelmaster-net

  java-api:
    build:
      context: ./travel-master-backend
      dockerfile: Dockerfile
    container_name: travelmaster-java-api
    restart: unless-stopped
    environment:
      MYSQL_URL: jdbc:mysql://mysql:3306/travelmaster?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false
      MYSQL_USERNAME: travelmaster
      MYSQL_PASSWORD: travelmaster
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      JWT_SECRET: travelmaster-pro-demo-secret-travelmaster-pro-demo-secret
      INTERNAL_API_TOKEN: travelmaster-internal-token
      PYTHON_AGENT_URL: http://python-ai:8000
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - travelmaster-net

  python-ai:
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: travelmaster-python-ai
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379/0
      JAVA_CALLBACK_BASE_URL: http://java-api:8080/api/internal/ai/tasks
      INTERNAL_API_TOKEN: travelmaster-internal-token
      ENABLE_STREAM_WORKER: "true"
      MOCK_EXTERNAL: "true"
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4:e4b}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      AMAP_API_KEY: ${AMAP_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - travelmaster-net

  nginx:
    image: nginx:1.25-alpine
    container_name: travelmaster-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./config/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./travel-master-frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - java-api
      - python-ai
    networks:
      - travelmaster-net

volumes:
  mysql-data:
  redis-data:

networks:
  travelmaster-net:
    driver: bridge
