global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'service']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'slack-notifications'

receivers:
  - name: 'slack-notifications'
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_URL}'
        channel: '#travelmaster-alerts'
        send_resolved: true
        title: '{{ .Status | toUpper }}: {{ .CommonAnnotations.summary }}'
        text: >-
          *Alert:* {{ .CommonAnnotations.summary }}
          *Description:* {{ .CommonAnnotations.description }}
          *Severity:* {{ .CommonLabels.severity }}
          *Service:* {{ .CommonLabels.service }}
          *Time:* {{ .StartsAt.Format "15:04:05 UTC" }}
          *Graph:* <{{ .ExternalURL }}|View in Grafana>

  - name: 'email-notifications'
    email_configs:
      - to: 'dev-ops@travelmaster.com'
        from: 'alerts@travelmaster.com'
        smarthost: 'smtp.travelmaster.com:587'
        auth_username: 'alerts@travelmaster.com'
        auth_password: '${SMTP_PASSWORD}'
        send_resolved: true
        subject: '[{{ .Status | toUpper }}] {{ .CommonAnnotations.summary }}'
        html: |-
          <html>
          <body>
          <h3>{{ .Status | toUpper }}: {{ .CommonAnnotations.summary }}</h3>
          <p><strong>Description:</strong> {{ .CommonAnnotations.description }}</p>
          <p><strong>Severity:</strong> {{ .CommonLabels.severity }}</p>
          <p><strong>Service:</strong> {{ .CommonLabels.service }}</p>
          <p><strong>Time:</strong> {{ .StartsAt.Format "2006-01-02 15:04:05 UTC" }}</p>
          </body>
          </html>

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'service']